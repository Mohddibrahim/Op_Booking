{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-body">

                    <h4 class="text-center mb-4">
                        Confirm Appointment
                    </h4>
                    
                    <p><strong>Doctor:</strong> {{ slot.doctor.name }}</p>
                    <p><strong>Specialization:</strong> {{ slot.doctor.specialization }}</p>
                    <p><strong>Date:</strong> {{ slot.date }}</p>
                    <p><strong>Time:</strong> {{ slot.start_time }}</p>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Patient Name</label>
                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   required>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Confirm Booking
                        </button>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
