{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{% static 'CSS/login.css' %}">
</head>
<body>
<div class="main-login">
    <div class="sub-login">
        <h2>Login</h2>
    </div>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
          <p class="signup-link">
        Don’t have an account?
        <a href="{% url 'signup' %}">Create one</a>
    </p>
    </form>
</div>
</body>
</html>
